# QA Agent Pipeline — single source of truth

version: "1.2"
project: qa-agent

# 主 Agent：编排与决策（见 agents/qa-orchestrator.md）
orchestrator:
  agent: qa-orchestrator
  # 对用户：只说「启动流水线」；Cursor 默认 ide-chain（Hook+Task），禁止未放行的 --auto
  auto_launch_subagents: true
  default_launch_mode: ide-chain
  cursor_cli_requires: allow-cli  # QA_PIPELINE_ALLOW_CLI=1 或 --allow-cli
  default_entry: orchestrators/cursor/run-pipeline.sh
  decisions:
    case_review_product_reject: stop_and_notify_product
    case_review_internal_reject: auto_retry_prd_analyze_then_orchestrator_check
    case_review_fail_max: escalate_human
    test_has_pass: run_script_convert
    test_has_fail: bug_list_in_test_execute

inputs:
  prd: workspace/inputs/prd.md
  figma: workspace/inputs/figma.url
  config: workspace/inputs/config.yaml
  env: workspace/inputs/env.json

artifacts_dir: workspace/artifacts
meta: workspace/artifacts/00-meta.json

review:
  pass_threshold: 0.85
  test_point_coverage_threshold: 0.90
  max_regenerate_retries: 2

auto:
  stage_timeout_sec: 3600
  models:
    cursor: auto
    codex: null
    claude-code: null

stages:
  - id: prd-analyze
    agent: prd-analyzer
    skill: prd-analyze
    contract: contracts/test-blueprint.schema.json
    inputs:
      - workspace/inputs/config.yaml
      - workspace/inputs/prd.md
      - workspace/inputs/figma.url
      - bundled/knowledge_base/README.md
    outputs:
      - workspace/artifacts/00-knowledge-inventory.json
      - workspace/artifacts/00-knowledge-inventory.md
      - workspace/artifacts/00-knowledge-context.json
      - workspace/artifacts/00-knowledge-context.md
      - workspace/artifacts/00-test-blueprint.json
      - workspace/artifacts/00-test-blueprint.md
    output: workspace/artifacts/00-test-blueprint.json

  - id: case-generate
    agent: case-generator
    skill: case-generate
    depends_on:
      - prd-analyze
    inputs:
      - workspace/inputs/config.yaml
      - workspace/artifacts/00-test-blueprint.json
    output: workspace/artifacts/02-test-cases.md

  - id: case-review
    agent: case-reviewer
    skill: case-review
    contract: contracts/review-report.schema.json
    depends_on:
      - prd-analyze
      - case-generate
    inputs:
      - workspace/inputs/config.yaml
      - workspace/inputs/prd.md
      - workspace/inputs/figma.url
      - workspace/artifacts/00-test-blueprint.json
      - workspace/artifacts/00-test-blueprint.md
      - workspace/artifacts/02-test-cases.md
      - workspace/artifacts/00-knowledge-context.json
      - workspace/artifacts/00-knowledge-context.md
      - workspace/artifacts/00-test-data.json
    outputs:
      - workspace/artifacts/case-review-precheck.json
      - workspace/artifacts/prd-coverage-matrix.json
      - workspace/artifacts/case-review-perspective-brief.json
      - workspace/artifacts/case-review-perspective-brief.md
      - workspace/artifacts/case-review-findings-structural.json
      - workspace/artifacts/case-review-findings-product.json
      - workspace/artifacts/case-review-findings-qa.json
      - workspace/artifacts/case-review-findings-testability.json
      - workspace/artifacts/case-review-findings-red-team.json
      - workspace/artifacts/03-review-report.json
      - workspace/artifacts/03-review-report.md
    output: workspace/artifacts/03-review-report.json
    on_fail:
      product_reject:
        root_causes: [prd, figma, assumption_unresolved]
        notify: workspace/artifacts/prd-reject-to-product.md
        retry_from: prd-analyze
      blueprint_rework:
        root_causes: [qa_undercoverage]
        notify: workspace/artifacts/test-point-rework-to-qa.md
        retry_stage: prd-analyze
      case_generation_rework:
        root_causes: [case_generation]
        notify: workspace/artifacts/test-point-rework-to-qa.md
        retry_stage: prd-analyze
      max_retries: 3
      hint_field: revision_hints
      escalate: orchestrator

  - id: test-execute
    agent: test-executor
    skill: test-execute
    contract: contracts/execution-result.schema.json
    gate: review.pass
    depends_on:
      - case-review
    inputs:
      - workspace/artifacts/02-test-cases.md
      - workspace/inputs/figma.url
      - workspace/inputs/env.json
    outputs:
      - workspace/artifacts/04-execution-result.json
      - workspace/artifacts/05b-bug-list.md
    output_notes: 有失败用例时必须同时生成 05b-bug-list.md

  - id: post-process
    parallel: false
    depends_on:
      - test-execute
    branches:
      - id: script-convert
        agent: script-converter
        skill: script-convert
        when: execution.has_pass
        inputs:
          - workspace/artifacts/04-execution-result.json
          - workspace/artifacts/02-test-cases.md
        output: workspace/artifacts/05a-scripts/
