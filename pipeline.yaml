# QA Agent Pipeline — single source of truth

version: "1.2"
project: qa-agent

# 主 Agent：编排与决策（见 agents/qa-orchestrator.md）
orchestrator:
  agent: qa-orchestrator
  # 对用户口令：「帮我跑 QA Agent」；默认 --ide-chain（IDE），非 --auto（CLI）
  user_phrase: 帮我跑 QA Agent
  auto_launch_subagents: true
  default_mode: ide-chain
  default_entry: orchestrators/cursor/run-pipeline.sh
  decisions:
    prd_gate_reject: stop_and_notify_product
    case_review_fail: retry_case_generate
    case_review_fail_max: escalate_human
    test_has_pass: run_script_convert
    test_has_fail: bug_list_in_test_execute

inputs:
  prd: workspace/inputs/prd.md
  figma: workspace/inputs/figma.url
  config: workspace/inputs/config.yaml
  env: workspace/inputs/env.json

artifacts_dir: workspace/artifacts
meta: workspace/artifacts/00-meta.json

review:
  pass_threshold: 0.85
  test_point_coverage_threshold: 0.90
  max_regenerate_retries: 2

auto:
  stage_timeout_sec: 3600
  models:
    cursor: auto
    codex: null
    claude-code: null

stages:
  - id: prd-analyze
    agent: prd-analyzer
    skill: prd-analyze
    contract: contracts/prd-analysis.schema.json
    inputs:
      - workspace/inputs/prd.md
      - workspace/inputs/figma.url
    outputs:
      - workspace/artifacts/00-test-ready-blueprint.json
      - workspace/artifacts/00-test-obligations.json
      - workspace/artifacts/01-prd-analysis.json
      - workspace/artifacts/test-ready-internal.md
    output: workspace/artifacts/01-prd-analysis.json

  - id: prd-gate
    agent: prd-gatekeeper
    skill: prd-gate
    contract: contracts/prd-gate-report.schema.json
    depends_on:
      - prd-analyze
    prerequisite_script: scripts/analyze_gate_prerequisites.py
    prerequisite_note: analyze 全文校验未通过时禁止 gate 与 prd-reject-to-product.md
    inputs:
      - workspace/inputs/prd.md
      - workspace/inputs/figma.url
      - workspace/artifacts/00-test-ready-blueprint.json
      - workspace/artifacts/00-test-obligations.json
      - workspace/artifacts/01-prd-analysis.json
    outputs:
      - workspace/artifacts/00-prd-gate-report.json
      - workspace/artifacts/gate-findings-product.json
      - workspace/artifacts/gate-findings-dev.json
      - workspace/artifacts/gate-findings-qa.json
      - workspace/artifacts/gate-findings-red-team.json
      - workspace/artifacts/prd-gate-pass-to-product.md
      - workspace/artifacts/prd-reject-to-product.md
      - workspace/artifacts/test-point-rework-to-qa.md
    output: workspace/artifacts/00-prd-gate-report.json
    on_fail:
      verdict: reject
      action: stop_pipeline
      notify: workspace/artifacts/prd-reject-to-product.md
      retry_from: prd-analyze

  - id: case-generate
    agent: case-generator
    skill: case-generate
    gate: prd_gate.pass
    depends_on:
      - prd-gate
    inputs:
      - workspace/artifacts/00-test-ready-blueprint.json
      - workspace/artifacts/01-prd-analysis.json
    output: workspace/artifacts/02-test-cases.md

  - id: case-review
    agent: case-reviewer
    skill: case-review
    contract: contracts/review-report.schema.json
    gate: prd_gate.pass
    depends_on:
      - prd-gate
      - case-generate
    inputs:
      - workspace/artifacts/00-test-ready-blueprint.json
      - workspace/artifacts/02-test-cases.md
    output: workspace/artifacts/03-review-report.json
    on_fail:
      retry_stage: case-generate
      max_retries: 2
      hint_field: revision_hints
      escalate: orchestrator

  - id: test-execute
    agent: test-executor
    skill: test-execute
    contract: contracts/execution-result.schema.json
    gate: review.pass
    depends_on:
      - case-review
    inputs:
      - workspace/artifacts/02-test-cases.md
      - workspace/inputs/figma.url
      - workspace/inputs/env.json
    outputs:
      - workspace/artifacts/04-execution-result.json
      - workspace/artifacts/05b-bug-list.md
    output_notes: 有失败用例时必须同时生成 05b-bug-list.md

  - id: post-process
    parallel: false
    depends_on:
      - test-execute
    branches:
      - id: script-convert
        agent: script-converter
        skill: script-convert
        when: execution.has_pass
        inputs:
          - workspace/artifacts/04-execution-result.json
          - workspace/artifacts/02-test-cases.md
        output: workspace/artifacts/05a-scripts/
